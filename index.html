    <script type="text/javascript">
      // Safe guard against sandboxed iframe/CORS errors thrown by cross-origin widgets (like Crisp or Tovik)
      window.onerror = function(message, source, lineno, colno, error) {
        var msg = String(message || '');
        var src = String(source || '');
        // Detailed logging for legitimate app errors to help debug
        if (src && src.indexOf(window.location.origin) !== -1) {
          console.error('[App Error Uncaught]', msg, 'at', src, ':', lineno, ':', colno);
          if (error && error.stack) console.error(error.stack);
        }
        
        if (!msg || msg.includes('SecurityError') || msg.includes('Blocked a frame') || msg.includes('cross-origin') || msg.includes('Script error') || msg.includes('uncaught') || msg.includes('0') || msg.includes('error 0') || !src || src.indexOf(window.location.origin) === -1) {
          console.warn('[Sandbox Guard] Muted cross-origin or anonymous script error:', msg, 'from:', src);
          return true; // Prevents the firing of the default error reporting
        }
      };

      window.addEventListener('error', function(e) {
        var msg = e.message || '';
        var filename = e.filename || '';
        if (!msg || msg.includes('SecurityError') || msg.includes('Blocked a frame') || msg.includes('cross-origin') || msg.includes('Script error') || msg.includes('uncaught') || msg.includes('0') || msg.includes('error 0') || !filename || filename.indexOf(window.location.origin) === -1) {
          try {
            e.preventDefault();
            e.stopImmediatePropagation();
          } catch(err) {}
        }
      }, true);

      // Handle unhandledrejection to prevent noise from quota/timeout/third-party widgets in dev sandbox
      window.addEventListener('unhandledrejection', function(event) {
        try {
          var reasonStr = event.reason ? String(event.reason.message || event.reason) : '';
          console.warn('[Sandbox Guard] Intercepted unhandled promise rejection:', reasonStr);
          if (event.reason && event.reason.stack) console.error(event.reason.stack);
          event.preventDefault(); // Prevent crash event logging in sandbox
        } catch(err) {}
      }, true);
    </script>
